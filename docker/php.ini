; ─────────────────────────────────────────────
; Aula360 PHP production configuration
; ─────────────────────────────────────────────

[PHP]
; Memory limit — generous for dompdf PDF generation
memory_limit = 256M

; File upload limits (report cards, student documents)
upload_max_filesize = 20M
post_max_size = 20M

; Request timeout (allow time for PDF generation)
max_execution_time = 180
max_input_time = 180

; Error reporting — log only, never display in production
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Session security
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; Timezone — Colombia (UTC-5, no DST)
date.timezone = America/Bogota

; ─────────────────────────────────────────────
; OPcache — precompiles PHP scripts for speed
; ─────────────────────────────────────────────
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1
