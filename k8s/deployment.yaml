apiVersion: apps/v1
kind: Deployment
metadata:
  name: aula360-app
  namespace: aula360
  labels:
    app: aula360-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aula360-app
  template:
    metadata:
      labels:
        app: aula360-app
    spec:
      containers:
        - name: aula360
          image: ingmontoyav/aula360:latest
          ports:
            - containerPort: 80
              protocol: TCP

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          env:
            # ── Application ──────────────────────────────────────────────
            - name: APP_NAME
              value: "Aula360"
            - name: APP_ENV
              value: "production"
            - name: APP_DEBUG
              value: "false"
            - name: APP_URL
              value: "https://app.aula360.co"
            - name: APP_LOCALE
              value: "es"

            # ── Database ─────────────────────────────────────────────────
            - name: DB_CONNECTION
              value: "pgsql"
            - name: DB_HOST
              value: "postgres.default.svc.cluster.local"
            - name: DB_PORT
              value: "5432"

            # ── Queue / Cache / Session ───────────────────────────────────
            - name: QUEUE_CONNECTION
              value: "database"
            - name: CACHE_STORE
              value: "database"
            - name: SESSION_DRIVER
              value: "database"

            # ── Logging ──────────────────────────────────────────────────
            - name: LOG_CHANNEL
              value: "stderr"
            - name: LOG_LEVEL
              value: "error"

            # ── Mail ─────────────────────────────────────────────────────
            - name: MAIL_MAILER
              value: "log"
            - name: MAIL_FROM_ADDRESS
              value: "noreply@aula360.co"
            - name: MAIL_FROM_NAME
              value: "Aula360"

            # ── Storage ──────────────────────────────────────────────────
            - name: FILESYSTEM_DISK
              value: "local"

            # ── Auth / CORS ───────────────────────────────────────────────
            - name: SANCTUM_STATEFUL_DOMAINS
              value: "app.aula360.co"
            - name: FRONTEND_URL
              value: "https://app.aula360.co"

            # ── Broadcasting (not used — no Reverb in this app) ───────────
            - name: BROADCAST_CONNECTION
              value: "log"

            # ── AI / Anthropic ────────────────────────────────────────────
            - name: ANTHROPIC_MODEL
              value: "claude-haiku-4-5-20251001"
            - name: OLLAMA_URL
              value: ""

            # ── Secrets from aula360-secrets ──────────────────────────────
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: aula360-secrets
                  key: APP_KEY
            - name: DB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: aula360-secrets
                  key: DB_DATABASE
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: aula360-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aula360-secrets
                  key: DB_PASSWORD
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aula360-secrets
                  key: ANTHROPIC_API_KEY
